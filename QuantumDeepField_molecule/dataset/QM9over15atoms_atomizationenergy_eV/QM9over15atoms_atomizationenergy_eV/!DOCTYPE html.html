<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분자 특성 예측 프로그램</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drag-over {
            border-color: #4F46E5 !important;
            background-color: #EEF2FF !important;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-8">
    <!-- 기존 HTML 구조 동일 -->
    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-900 mb-2">분자 특성 예측 프로그램</h1>
            <p class="text-gray-600">XYZ 파일을 업로드하여 분자의 HOMO/LUMO 특성을 분석합니다</p>
        </div>

        <div class="flex justify-center mb-8">
            <div class="flex items-center space-x-4">
                <div class="flex items-center" id="step1-indicator">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center bg-indigo-600 text-white">1</div>
                    <span class="ml-2 font-medium text-indigo-600">XYZ 업로드</span>
                </div>
                <div class="w-12 h-1 bg-gray-300"></div>
                <div class="flex items-center text-gray-400" id="step2-indicator">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-300">2</div>
                    <span class="ml-2 font-medium">파일 변환</span>
                </div>
                <div class="w-12 h-1 bg-gray-300"></div>
                <div class="flex items-center text-gray-400" id="step3-indicator">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-300">3</div>
                    <span class="ml-2 font-medium">특성 분석</span>
                </div>
            </div>
        </div>

        <div id="step1-content">
            <div class="space-y-6">
                <div class="bg-white rounded-lg shadow-lg p-8">
                    <div class="text-center border-4 border-dashed rounded-xl p-12 border-gray-300" id="xyz-dropzone">
                        <svg class="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                        <h2 class="text-2xl font-bold text-gray-800 mb-4">XYZ 파일 업로드</h2>
                        <p class="text-gray-600 mb-2">분자 구조가 포함된 XYZ 파일을 업로드하세요</p>
                        <p class="text-gray-500 text-sm mb-6">파일을 드래그하여 놓거나 버튼을 클릭하세요</p>
                        <label class="inline-block">
                            <input type="file" accept=".xyz" id="xyz-file-input" class="hidden">
                            <div class="px-6 py-3 bg-indigo-600 text-white rounded-lg cursor-pointer hover:bg-indigo-700 transition">파일 선택</div>
                        </label>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-lg p-6">
                    <div class="text-center">
                        <h3 class="text-lg font-bold text-gray-800 mb-2">이미 변환된 파일이 있나요?</h3>
                        <p class="text-gray-600 text-sm mb-4">변환 단계를 건너뛰고 바로 데이터 파일을 업로드할 수 있습니다</p>
                        <button id="skip-button" class="px-6 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">2단계로 건너뛰기</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="step2-content" class="hidden bg-white rounded-lg shadow-lg p-8"></div>
        <div id="step3-content" class="hidden bg-white rounded-lg shadow-lg p-8"></div>
    </div>

    <script>
        let currentStep = 1;
        let convertedData = null;
        let molecularFormula = '';
        let properties = null;

        // 페이지 로드 시 이벤트 바인딩
        document.addEventListener('DOMContentLoaded', function() {
            setupXyzUpload();
            document.getElementById('skip-button').addEventListener('click', skipToStep2);
        });

        function updateStep(step) {
            currentStep = step;
            document.getElementById('step1-content').classList.add('hidden');
            document.getElementById('step2-content').classList.add('hidden');
            document.getElementById('step3-content').classList.add('hidden');

            if (step === 1) {
                document.getElementById('step1-content').classList.remove('hidden');
                updateIndicator(1);
            } else if (step === 2) {
                document.getElementById('step2-content').classList.remove('hidden');
                updateIndicator(2);
            } else if (step === 3) {
                document.getElementById('step3-content').classList.remove('hidden');
                updateIndicator(3);
            }
        }

        function updateIndicator(step) {
            const indicators = ['step1-indicator', 'step2-indicator', 'step3-indicator'];
            indicators.forEach(function(id, index) {
                const element = document.getElementById(id);
                const circle = element.querySelector('div');
                
                if (index + 1 <= step) {
                    element.classList.remove('text-gray-400');
                    element.classList.add('text-indigo-600');
                    circle.classList.remove('bg-gray-300');
                    circle.classList.add('bg-indigo-600', 'text-white');
                } else {
                    element.classList.add('text-gray-400');
                    element.classList.remove('text-indigo-600');
                    circle.classList.add('bg-gray-300');
                    circle.classList.remove('bg-indigo-600', 'text-white');
                }
            });
        }

        // XYZ 업로드 설정
        function setupXyzUpload() {
            const input = document.getElementById('xyz-file-input');
            const dropzone = document.getElementById('xyz-dropzone');
            
            input.addEventListener('change', function(e) {
                if (e.target.files.length > 0) handleXyzFile(e.target.files[0]);
            });
            
            dropzone.addEventListener('dragover', function(e) {
                e.preventDefault();
                dropzone.classList.add('drag-over');
            });
            dropzone.addEventListener('dragleave', function(e) {
                e.preventDefault();
                dropzone.classList.remove('drag-over');
            });
            dropzone.addEventListener('drop', function(e) {
                e.preventDefault();
                dropzone.classList.remove('drag-over');
                if (e.dataTransfer.files.length > 0) handleXyzFile(e.dataTransfer.files[0]);
            });
        }

        function convertXyzFile(fileContent) {
            const lines = fileContent.trim().split('\n');
            const atomCount = parseInt(lines[0]);
            const atoms = [];
            const atomCounts = {};
            
            for (let i = 2; i < 2 + atomCount; i++) {
                const parts = lines[i].trim().split(/\s+/);
                const element = parts[0];
                const x = parseFloat(parts[1]);
                const y = parseFloat(parts[2]);
                const z = parseFloat(parts[3]);
                atoms.push({ element: element, x: x, y: y, z: z });
                atomCounts[element] = (atomCounts[element] || 0) + 1;
            }
            
            let formula = '';
            if (atomCounts['C']) formula += 'C' + (atomCounts['C'] > 1 ? atomCounts['C'] : '');
            if (atomCounts['H']) formula += 'H' + (atomCounts['H'] > 1 ? atomCounts['H'] : '');
            
            Object.keys(atomCounts).sort().forEach(function(element) {
                if (element !== 'C' && element !== 'H') {
                    formula += element + (atomCounts[element] > 1 ? atomCounts[element] : '');
                }
            });
            
            molecularFormula = formula;
            let converted = formula + '\n';
            atoms.forEach(function(atom) {
                converted += atom.element + ' ' + atom.x + ' ' + atom.y + ' ' + atom.z + '\n';
            });
            converted += '0 0';
            return converted;
        }

        // 나머지 함수들 (extractProperties, formatFormula 등)은 동일...
        // [공간 절약을 위해 생략 - 원본과 동일]

        function handleXyzFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                convertedData = convertXyzFile(e.target.result);
                showStep2WithConversion();
            };
            reader.readAsText(file);
        }

        function skipToStep2() {  // ✅ 이제 완전한 함수
            showStep2Skip();
        }

        function showStep2Skip() {
            const step2 = document.getElementById('step2-content');
            step2.innerHTML = `
                <div class="text-center mb-6">
                    <svg class="w-16 h-16 mx-auto text-indigo-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">데이터 파일 업로드</h2>
                    <p class="text-gray-600">HOMO/LUMO 데이터가 포함된 파일을 업로드하세요</p>
                </div>
                <div class="text-center border-4 border-dashed rounded-xl p-12 mb-6 border-gray-300 drag-over-hover" id="data-dropzone-skip">
                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="text-gray-600 mb-2">데이터 파일을 업로드하세요</p>
                    <p class="text-gray-500 text-sm mb-6">파일을 드래그하여 놓거나 버튼을 클릭하세요</p>
                    <label class="inline-block">
                        <input type="file" accept=".txt" id="data-file-input-skip" class="hidden">
                        <div class="px-6 py-3 bg-indigo-600 text-white rounded-lg cursor-pointer hover:bg-indigo-700 transition">데이터 파일 업로드</div>
                    </label>
                </div>
                <div class="text-center">
                    <button onclick="updateStep(1)" class="px-6 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition">1단계로 돌아가기</button>
                </div>
            `;
            updateStep(2);
            
            // 이벤트 리스너 즉시 설정 ✅
            setTimeout(() => setupDataFileUploadSkip(), 100);
        }

        function setupDataFileUploadSkip() {
            const input = document.getElementById('data-file-input-skip');
            const dropzone = document.getElementById('data-dropzone-skip');
            if (input && dropzone) {
                input.addEventListener('change', function(e) { 
                    if (e.target.files.length > 0) handleDataFile(e.target.files[0]); 
                });
                dropzone.addEventListener('dragover', function(e) { 
                    e.preventDefault(); 
                    dropzone.classList.add('drag-over'); 
                });
                dropzone.addEventListener('dragleave', function(e) { 
                    e.preventDefault(); 
                    dropzone.classList.remove('drag-over'); 
                });
                dropzone.addEventListener('drop', function(e) { 
                    e.preventDefault(); 
                    dropzone.classList.remove('drag-over'); 
                    if (e.dataTransfer.files.length > 0) handleDataFile(e.dataTransfer.files[0]); 
                });
            }
        }

        function resetApp() {
            currentStep = 1;
            convertedData = null;
            molecularFormula = '';
            properties = null;
            updateStep(1);
        }

        // handleDataFile, showStep3 등 나머지 함수들은 원본과 동일
    </script>
</body>
</html>
